<!doctype html>
<html lang="en">

<body style="margin:0;padding:24px;background:#f5f7fb;font-family:Arial,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;margin:0 auto;background:#ffffff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;">
        <tr>
            <td style="padding:28px 28px 12px 28px;">
                <h2 style="margin:0;font-size:22px;line-height:1.3;color:#0f172a;">{{ app_name }} Password Reset</h2>
            </td>
        </tr>
        <tr>
            <td style="padding:0 28px 10px 28px;font-size:15px;line-height:1.6;color:#334155;">
                Use this verification code to continue resetting your password:
            </td>
        </tr>
        <tr>
            <td style="padding:0 28px 14px 28px;">
                <div style="display:inline-block;padding:12px 16px;background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;font-size:30px;line-height:1;letter-spacing:6px;font-weight:700;color:#1e3a8a;">
                    {{ code }}
                </div>
            </td>
        </tr>
        <tr>
            <td style="padding:0 28px 28px 28px;font-size:13px;line-height:1.6;color:#64748b;">
                If you did not request this, you can safely ignore this email.
            </td>
        </tr>
    </table>
</body>

</html>
