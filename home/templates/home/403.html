<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Georgia, "Times New Roman", serif;
            background: linear-gradient(135deg, #f5efe6, #d7c6b2);
            color: #2d1f16;
        }

        main {
            width: min(90vw, 560px);
            padding: 40px;
            border-radius: 24px;
            background: rgba(255, 250, 244, 0.96);
            box-shadow: 0 20px 60px rgba(45, 31, 22, 0.14);
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 3rem;
        }

        p {
            margin: 0 0 24px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 999px;
            background: #2d1f16;
            color: #fffaf4;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <h1>403</h1>
        <p>You do not have permission to access the admin area.</p>
        <a href="/home/">Back to Home</a>
    </main>
</body>
</html>
