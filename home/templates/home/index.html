{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY Site</title>
    <link rel="stylesheet" href="{% static 'home/styles/base.css' %}">
</head>

<body>
    <div id="login">
      <div class="header">
        <h1>HR MANAGEMENT APP 🚀</h1>
        <h3>Practice Your Knowledge</h3>
      </div>
      <form>
        <div class="group">
            <input id="username" required>
            <label>Username</label>
        </div>
        <div class="group">
          <input id="txtEmail" type="email" required>
          <label>Email</label>
        </div>

        <div class="group">
          <input id="txtPassword" type="password" required>
          <label>Password</label>
        </div>

        <div id="divLoginError" class="group">
          <div id="lblLoginErrorMessage" class="errorlabel">Error message</div>
        </div>

        <button id="btnLogin" type="button" class="button buttonBlue">Log in</button>
        <button id="btnSignup" type="button" class="button buttonBlue">Sign up</button>
      </form>

      <form class="msg">
        <div class="group">
          <h2>
            <div id="logoutAuthState" class="authlabel"></div>
          </h2>
        </div>
      </form>
    </div>
    <div id="app">
        <div class="header">
            <h1>Welcome to Your Amazing App</h1>
        </div>

        <form>
            <div class="group">
                <h4>
                    <div id="lblAuthState" class="authlabel"></div>
                </h4>
            </div>
            <button id="btnLogout" type="button" class="button buttonBlue">Log out</button>
        </form>

    </div>
</body>

</html>
