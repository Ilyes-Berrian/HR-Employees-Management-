{% load static %}
<!DOCTYPE html>
<html lang="en">
<!--
    HRM Dashboard - Main page template
    Responsive layout with left sidebar, dark mode toggle, and main content area.
    Uses Django static files: base.css and dashboard.js
    -->

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRM Dashboard</title>
    <link rel="stylesheet" href="{% static 'home/styles/base.css' %}">
</head>

<body class="dashboard-body">
    <!-- Flex container: sidebar + main content -->
    <div class="dashboard-wrapper ">
        <!-- Left sidebar: navigation, brand, search, dark mode -->
        <aside class="sidebar " aria-label="Main navigation">
            <!-- Brand header with collapse/expand toggle -->
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-logo ">HR</div>
                    <div class="brand-text">
                        <span class="brand-title">HR Manager</span>
                    </div>
                </div>
            </div>
            <button class="sidebar-toggle" type="button" aria-label="Toggle sidebar">
                <span class="sidebar-toggle-chevron" aria-hidden="true"></span>
            </button>
            <!-- Primary navigation links -->
            <nav class="sidebar-nav">
                <button class="nav-item active" type="button" data-page="Dashboard">
                        <i class="fas fa-home" aria-hidden="true"></i>
                        <span class="nav-label">Dashboard</span>
                </button>
                <button class="nav-item" type="button" data-page="Database">
                        <i class="fas fa-database" aria-hidden="true"></i>
                        <span class="nav-label">DataBase</span>
                    </button>
                <button class="nav-item" type="button" data-page="Add">
                        <i class="fas fa-plus" aria-hidden="true"></i>
                        <span class="nav-label">Add</span>
                    </button>
                <button class="nav-item" type="button" data-page="Attestations">
                        <i class="fas fa-certificate" aria-hidden="true"></i>
                        <span class="nav-label">Attestations</span>
                    </button>
                <button class="nav-item" type="button" data-page="Settings">
                        <i class="fas fa-cog" aria-hidden="true"></i>
                        <span class="nav-label">Settings</span>
                </button>
            </nav>

            <!-- Footer: logout + dark mode toggle -->
            <div class="sidebar-footer">
                <button class="nav-item" type="button" data-page="Profile">
                    <i class="fas fa-user" aria-hidden="true"></i>
                    <span class="nav-label">Profile</span>
                </button>
                <button class="nav-item" type="button" data-page="Logout">
                    <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
                    <span class="nav-label">Logout</span>
                </button>

                <div class="darkmode-row">
                    <div class="darkmode-label">
                        <i class="fas fa-moon" aria-hidden="true"></i>
                        <span class="nav-label">Dark mode</span>
                    </div>
                    <label class="toggle-switch">
                            <input type="checkbox" id="darkModeToggle" aria-label="Toggle dark mode">
                            <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </aside>

        <!-- Main content area -->
        <main class="main-content">

            <!-- Default page content (for non-settings pages) -->
            <section class="content-grid" id="defaultContent">
                <article class="content-card">
                    <h2 id="pageTitle">Dashboard</h2>
                    <p id="pageDescription">Select an item from the sidebar to view its content.</p>
                </article>
            </section>

            <!-- Settings page layout: sub-sidebar + main panel -->
            <section class="settings-layout hidden" id="settingsLayout" aria-label="Settings content">
                <aside class="settings-sub-sidebar" aria-label="Settings sections">
                    <button class="settings-tab active" type="button" data-settings-tab="personal">
                        <i class="fas fa-user-circle" aria-hidden="true"></i>
                        <span>Personal</span>
                    </button>
                    <button class="settings-tab" type="button" data-settings-tab="security">
                        <i class="fas fa-shield-halved" aria-hidden="true"></i>
                        <span>Security</span>
                    </button>
                </aside>

                <div class="settings-main">
                    <article class="settings-card">
                        <header class="settings-card-header">
                            <h2 class="settings-page-title">Settings</h2>
                        </header>

                        <div class="settings-panels" id="settingsPanels">
                            <section class="settings-panel active" data-settings-panel="personal" aria-labelledby="personal-heading">
                                <h3 id="personal-heading" class="settings-section-title">Personal Information</h3>
                                <form class="settings-form" action="#" method="post" novalidate>
                                    <div class="profile-upload-block">
                                        <label class="profile-upload-label" for="profileImage">Profile Picture</label>
                                        <div class="profile-upload-row">
                                            <div class="profile-avatar" id="profileAvatar" aria-hidden="true">HR</div>
                                            <div class="profile-upload-actions">
                                                <input class="profile-upload-input" type="file" id="profileImage" accept="image/*">
                                                <label class="profile-upload-button" for="profileImage">Upload Image</label>
                                                <p class="profile-upload-file" id="profileFileName">No file selected</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="form-grid two-col">
                                        <div class="field-group">
                                            <label for="fullName">Full Name</label>
                                            <input id="fullName" type="text" placeholder="Enter your full name">
                                        </div>
                                        <div class="field-group">
                                            <label for="emailAddress">Email Address</label>
                                            <input id="emailAddress" type="email" placeholder="name@company.com">
                                        </div>
                                        <div class="field-group">
                                            <label for="phoneNumber">Phone Number</label>
                                            <input id="phoneNumber" type="tel" placeholder="+212 6 00 00 00 00">
                                        </div>
                                    </div>

                                    <div class="form-actions">
                                        <button class="btn btn-secondary" type="button">Edit</button>
                                        <button class="btn btn-primary" type="submit">Save Changes</button>
                                    </div>
                                </form>
                            </section>

                            <section class="settings-panel" data-settings-panel="security" aria-labelledby="security-heading">
                                <h3 id="security-heading" class="settings-section-title">Security</h3>
                                <form class="settings-form" action="#" method="post" novalidate>
                                    <div class="form-grid">
                                        <div class="field-group password-group">
                                            <label for="currentPassword">Current Password</label>
                                            <div class="password-input-wrap">
                                                <input id="currentPassword" type="password" autocomplete="current-password" placeholder="Enter current password">
                                                <button class="password-toggle" type="button" data-toggle-password="currentPassword" aria-label="Show or hide current password">
                                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                                </button>
                                            </div>
                                        </div>

                                        <div class="field-group password-group">
                                            <label for="newPassword">New Password</label>
                                            <div class="password-input-wrap">
                                                <input id="newPassword" type="password" autocomplete="new-password" placeholder="Enter new password">
                                                <button class="password-toggle" type="button" data-toggle-password="newPassword" aria-label="Show or hide new password">
                                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                                </button>
                                            </div>
                                            <div class="password-strength" aria-live="polite">
                                                <span class="strength-label">Strength</span>
                                                <div class="strength-meter" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                                                    <span class="strength-fill" id="strengthFill"></span>
                                                </div>
                                                <span class="strength-value" id="strengthValue">Weak</span>
                                            </div>
                                        </div>

                                        <div class="field-group password-group">
                                            <label for="confirmPassword">Confirm New Password</label>
                                            <div class="password-input-wrap">
                                                <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Confirm new password">
                                                <button class="password-toggle" type="button" data-toggle-password="confirmPassword" aria-label="Show or hide confirm password">
                                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                                </button>
                                            </div>
                                            <p class="match-feedback" id="passwordMatchFeedback" aria-live="polite"></p>
                                        </div>
                                    </div>

                                    <div class="form-actions">
                                        <button class="btn btn-primary" type="submit">Change Password</button>
                                    </div>
                                </form>
                            </section>
                        </div>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <!-- Dashboard script: dark mode toggle, sidebar collapse -->
    <script src="{% static 'home/scripts/dashboard.js' %}"></script>
</body>

</html>
